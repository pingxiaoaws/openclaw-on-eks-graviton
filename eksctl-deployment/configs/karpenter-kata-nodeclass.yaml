---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: kata-metal
spec:
  amiSelectorTerms:
    - id: ami-03fd8f02d5b4488c8  # Ubuntu 24.04 LTS ARM64 us-east-1

  amiFamily: Custom

  role: KarpenterNodeRole-openclaw-prod

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: openclaw-prod

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: openclaw-prod
        aws:eks:cluster-name: openclaw-prod

  blockDeviceMappings:
    - deviceName: /dev/sda1
      ebs:
        volumeSize: 200Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
        iops: 3000
        throughput: 125

  userData: |
    #!/bin/bash
    set -euo pipefail

    LOG_FILE="/var/log/kata-bootstrap.log"
    exec > >(tee -a "$LOG_FILE") 2>&1

    echo "=== Kata Node Bootstrap Started at $(date) ==="

    # ---- Phase 1: Devmapper setup (before bootstrap, no containerd dependency) ----
    echo "Phase 1: Installing packages and creating devmapper thin pool..."
    apt-get update -qq
    apt-get install -y -qq bc lvm2

    DATA_DIR=/var/lib/containerd/io.containerd.snapshotter.v1.devmapper
    POOL_NAME=devpool
    mkdir -p ${DATA_DIR}

    touch "${DATA_DIR}/data" && truncate -s 350G "${DATA_DIR}/data"
    touch "${DATA_DIR}/meta" && truncate -s 40G "${DATA_DIR}/meta"

    DATA_DEV=$(losetup --find --show "${DATA_DIR}/data")
    META_DEV=$(losetup --find --show "${DATA_DIR}/meta")

    SECTOR_SIZE=512
    DATA_SIZE="$(blockdev --getsize64 -q ${DATA_DEV})"
    LENGTH_IN_SECTORS=$(bc <<< "${DATA_SIZE}/${SECTOR_SIZE}")

    dmsetup create "${POOL_NAME}" \
        --table "0 ${LENGTH_IN_SECTORS} thin-pool ${META_DEV} ${DATA_DEV} 128 32768"
    echo "Thin pool created:" && dmsetup ls

    # ---- Phase 2: EKS Bootstrap ----
    echo "Phase 2: Running EKS bootstrap..."
    CLUSTER_NAME="{{CLUSTER_NAME}}"
    API_SERVER_URL="{{API_SERVER_URL}}"
    B64_CLUSTER_CA="{{B64_CLUSTER_CA}}"
    NODE_LABELS="workload-type=kata,katacontainers.io/kata-runtime=true,arch=arm64,os=ubuntu,managed-by=karpenter"

    /etc/eks/bootstrap.sh "${CLUSTER_NAME}" \
      --b64-cluster-ca "${B64_CLUSTER_CA}" \
      --apiserver-endpoint "${API_SERVER_URL}" \
      --kubelet-extra-args "--node-labels=${NODE_LABELS}" \
      --container-runtime containerd

    echo "EKS bootstrap completed"

    # ---- Phase 3: Configure containerd for Kata ----
    echo "Phase 3: Configuring containerd for Kata..."
    cp /etc/containerd/config.toml /etc/containerd/config.toml.backup

    cat >> /etc/containerd/config.toml << 'EOFCONTAINERD'

    # Devmapper snapshotter
    [plugins."io.containerd.snapshotter.v1.devmapper"]
      pool_name = "devpool"
      root_path = "/var/lib/containerd/io.containerd.snapshotter.v1.devmapper"
      base_image_size = "40GB"

    # Kata Firecracker runtime
    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata-fc]
      snapshotter = "devmapper"
      runtime_type = "io.containerd.kata-fc.v2"

    # Kata QEMU runtime
    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata-qemu]
      snapshotter = "devmapper"
      runtime_type = "io.containerd.kata-qemu.v2"
    EOFCONTAINERD

    systemctl restart containerd
    sleep 10
    echo "Containerd restarted with Kata config"
    ctr plugins ls | grep devmapper || echo "Warning: devmapper not ready yet"

    # ---- Phase 4: Devmapper reload service ----
    cat > /usr/local/bin/reload-devmapper.sh << 'EOFRELOAD'
    #!/bin/bash
    set -e
    DATA_DIR=/var/lib/containerd/io.containerd.snapshotter.v1.devmapper
    POOL_NAME=devpool
    if dmsetup ls | grep -q ${POOL_NAME}; then exit 0; fi
    DATA_DEV=$(losetup --find --show "${DATA_DIR}/data")
    META_DEV=$(losetup --find --show "${DATA_DIR}/meta")
    DATA_SIZE=$(blockdev --getsize64 -q ${DATA_DEV})
    LENGTH_IN_SECTORS=$(bc <<< "${DATA_SIZE}/512")
    dmsetup create "${POOL_NAME}" \
        --table "0 ${LENGTH_IN_SECTORS} thin-pool ${META_DEV} ${DATA_DEV} 128 32768"
    EOFRELOAD
    chmod +x /usr/local/bin/reload-devmapper.sh

    cat > /etc/systemd/system/devmapper-reload.service << 'EOFSERVICE'
    [Unit]
    Description=Reload devmapper for Kata
    After=local-fs.target
    Before=containerd.service
    [Service]
    Type=oneshot
    RemainAfterExit=yes
    ExecStart=/usr/local/bin/reload-devmapper.sh
    [Install]
    WantedBy=multi-user.target
    EOFSERVICE
    systemctl daemon-reload
    systemctl enable devmapper-reload.service

    echo "=== Kata Node Bootstrap Completed at $(date) ==="

  tags:
    Name: openclaw-kata-karpenter
    Environment: production
    Project: openclaw-multi-tenant
    ManagedBy: karpenter
    Runtime: kata-containers
    Hypervisor: firecracker

  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
