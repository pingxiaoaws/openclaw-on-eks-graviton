---
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: openclaw-prod
  region: us-east-1
  version: "1.34"
  tags:
    Environment: production
    Project: openclaw-multi-tenant
    ManagedBy: eksctl

vpc:
  cidr: 172.31.0.0/16
  nat:
    gateway: Single
  clusterEndpoints:
    privateAccess: true
    publicAccess: true

iam:
  withOIDC: true

managedNodeGroups:
  - name: standard-nodes
    instanceTypes:
      - m6g.xlarge
      - m6g.2xlarge
    desiredCapacity: 2
    minSize: 2
    maxSize: 6
    volumeSize: 100
    volumeType: gp3
    volumeEncrypted: true
    privateNetworking: true
    amiFamily: AmazonLinux2023

    labels:
      workload-type: standard
      node-class: system
      arch: arm64

    tags:
      Name: openclaw-standard-node
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/openclaw-prod: "owned"

    iam:
      withAddonPolicies:
        ebs: true
        efs: true
        albIngress: true
        cloudWatch: true
        autoScaler: true

addons:
  - name: vpc-cni
    version: v1.21.1-eksbuild.3
    resolveConflicts: overwrite

  - name: coredns
    version: v1.13.2-eksbuild.1
    resolveConflicts: overwrite

  - name: kube-proxy
    version: v1.34.3-eksbuild.5
    resolveConflicts: overwrite

  - name: aws-ebs-csi-driver
    version: v1.56.0-eksbuild.1
    resolveConflicts: overwrite
    wellKnownPolicies:
      ebsCSIController: true

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
    logRetentionInDays: 7
