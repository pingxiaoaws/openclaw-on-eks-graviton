---
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: openclaw-platform
  region: us-east-1

managedNodeGroups:
  - name: standard-nodes
    instanceTypes:
      - m6g.xlarge
      - m6g.2xlarge
    desiredCapacity: 2
    minSize: 2
    maxSize: 6
    volumeSize: 100
    volumeType: gp3
    volumeEncrypted: true
    privateNetworking: true
    amiFamily: AmazonLinux2023

    labels:
      workload-type: standard
      node-class: system
      arch: arm64

    tags:
      Name: openclaw-standard-node
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/openclaw-platform: "owned"

    iam:
      withAddonPolicies:
        ebs: true
        efs: true
        albIngress: true
        cloudWatch: true
        autoScaler: true
