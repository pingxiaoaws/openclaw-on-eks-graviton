---
# Kata Firecracker RuntimeClass
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-fc
  labels:
    kata-deploy/instance: default
handler: kata-fc
overhead:
  podFixed:
    cpu: 250m
    memory: 130Mi
scheduling:
  nodeSelector:
    katacontainers.io/kata-runtime: "true"
  tolerations:
    - key: kata-dedicated
      operator: Exists
      effect: NoSchedule
---
# Kata QEMU RuntimeClass
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-qemu
handler: kata-qemu
scheduling:
  nodeSelector:
    workload-type: kata
  tolerations:
    - key: kata-dedicated
      operator: Exists
      effect: NoSchedule
