AWSTemplateFormatVersion: '2010-09-09'
Description: 'OpenClaw - VPC and Network Infrastructure'

Parameters:
  EnvironmentName:
    Type: String
    Description: "Environment name for resource tagging"

  ClusterName:
    Type: String
    Description: "EKS cluster name for resource tagging"

  VpcCidr:
    Type: String
    Default: "172.31.0.0/16"
    Description: "CIDR block for VPC"
    AllowedPattern: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/(1[6-9]|2[0-8]))$"

Mappings:
  # 4 AZs across us-west-2 (2a, 2b, 2c, 2d)
  SubnetConfig:
    Public1:
      CIDR: "172.31.0.0/20"
    Public2:
      CIDR: "172.31.16.0/20"
    Public3:
      CIDR: "172.31.32.0/20"
    Public4:
      CIDR: "172.31.48.0/20"
    Private1:
      CIDR: "172.31.64.0/20"
    Private2:
      CIDR: "172.31.80.0/20"
    Private3:
      CIDR: "172.31.96.0/20"
    Private4:
      CIDR: "172.31.112.0/20"

Resources:
  # VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-vpc"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: !Sub "kubernetes.io/cluster/${ClusterName}"
          Value: shared

  # Internet Gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-igw"
        - Key: Environment
          Value: !Ref EnvironmentName

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public Subnets (4 AZs)
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [SubnetConfig, Public1, CIDR]
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-public-subnet-1"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: !Sub "kubernetes.io/cluster/${ClusterName}"
          Value: shared
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: karpenter.sh/discovery
          Value: !Ref ClusterName

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [SubnetConfig, Public2, CIDR]
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-public-subnet-2"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: !Sub "kubernetes.io/cluster/${ClusterName}"
          Value: shared
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: karpenter.sh/discovery
          Value: !Ref ClusterName

  PublicSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [SubnetConfig, Public3, CIDR]
      AvailabilityZone: !Select [2, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-public-subnet-3"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: !Sub "kubernetes.io/cluster/${ClusterName}"
          Value: shared
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: karpenter.sh/discovery
          Value: !Ref ClusterName

  PublicSubnet4:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [SubnetConfig, Public4, CIDR]
      AvailabilityZone: !Select [3, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-public-subnet-4"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: !Sub "kubernetes.io/cluster/${ClusterName}"
          Value: shared
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: karpenter.sh/discovery
          Value: !Ref ClusterName

  # Private Subnets (4 AZs)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [SubnetConfig, Private1, CIDR]
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-private-subnet-1"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: !Sub "kubernetes.io/cluster/${ClusterName}"
          Value: shared
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: karpenter.sh/discovery
          Value: !Ref ClusterName

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [SubnetConfig, Private2, CIDR]
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-private-subnet-2"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: !Sub "kubernetes.io/cluster/${ClusterName}"
          Value: shared
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: karpenter.sh/discovery
          Value: !Ref ClusterName

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [SubnetConfig, Private3, CIDR]
      AvailabilityZone: !Select [2, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-private-subnet-3"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: !Sub "kubernetes.io/cluster/${ClusterName}"
          Value: shared
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: karpenter.sh/discovery
          Value: !Ref ClusterName

  PrivateSubnet4:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [SubnetConfig, Private4, CIDR]
      AvailabilityZone: !Select [3, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-private-subnet-4"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: !Sub "kubernetes.io/cluster/${ClusterName}"
          Value: shared
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: karpenter.sh/discovery
          Value: !Ref ClusterName

  # NAT Gateway (single NAT for cost optimization)
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-nat-eip"
        - Key: Environment
          Value: !Ref EnvironmentName

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-nat-gateway"
        - Key: Environment
          Value: !Ref EnvironmentName

  # Route Tables
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-public-rt"
        - Key: Environment
          Value: !Ref EnvironmentName

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetRouteTableAssociation3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet3
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetRouteTableAssociation4:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet4
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-private-rt"
        - Key: Environment
          Value: !Ref EnvironmentName

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetRouteTableAssociation3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet3
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetRouteTableAssociation4:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet4
      RouteTableId: !Ref PrivateRouteTable

  # VPC Endpoints
  S3VpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      RouteTableIds:
        - !Ref PrivateRouteTable
        - !Ref PublicRouteTable
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - 's3:GetObject'
              - 's3:PutObject'
              - 's3:ListBucket'
            Resource: '*'

  EcrApiVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ecr.api"
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
        - !Ref PrivateSubnet4
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: true

  EcrDkrVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ecr.dkr"
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
        - !Ref PrivateSubnet4
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: true

  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for VPC endpoints"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VpcCidr
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-vpc-endpoint-sg"
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  VpcId:
    Description: "VPC ID"
    Value: !Ref VPC
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"

  VpcCidr:
    Description: "VPC CIDR block"
    Value: !Ref VpcCidr
    Export:
      Name: !Sub "${AWS::StackName}-VpcCidr"

  PublicSubnetIds:
    Description: "Comma-separated list of public subnet IDs"
    Value: !Sub "${PublicSubnet1},${PublicSubnet2},${PublicSubnet3},${PublicSubnet4}"
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnetIds"

  PrivateSubnetIds:
    Description: "Comma-separated list of private subnet IDs"
    Value: !Sub "${PrivateSubnet1},${PrivateSubnet2},${PrivateSubnet3},${PrivateSubnet4}"
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnetIds"

  PrivateSubnet1Id:
    Description: "Private Subnet 1 ID"
    Value: !Ref PrivateSubnet1

  PrivateSubnet2Id:
    Description: "Private Subnet 2 ID"
    Value: !Ref PrivateSubnet2

  PrivateSubnet3Id:
    Description: "Private Subnet 3 ID"
    Value: !Ref PrivateSubnet3

  PrivateSubnet4Id:
    Description: "Private Subnet 4 ID"
    Value: !Ref PrivateSubnet4

  NatGatewayId:
    Description: "NAT Gateway ID"
    Value: !Ref NatGateway

  InternetGatewayId:
    Description: "Internet Gateway ID"
    Value: !Ref InternetGateway
