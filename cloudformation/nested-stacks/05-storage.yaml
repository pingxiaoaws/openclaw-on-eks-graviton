AWSTemplateFormatVersion: '2010-09-09'
Description: 'OpenClaw - EFS Storage and StorageClasses'

Parameters:
  ClusterName:
    Type: String
    Description: "EKS cluster name"

  VpcId:
    Type: String
    Description: "VPC ID"

  VpcCidr:
    Type: String
    Description: "VPC CIDR block"

  PrivateSubnetIds:
    Type: CommaDelimitedList
    Description: "Comma-separated list of private subnet IDs"

  ArtifactBucket:
    Type: String
    Description: "S3 bucket for Lambda functions"

Resources:
  # ================================
  # EFS File System
  # ================================
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: elastic
      FileSystemTags:
        - Key: Name
          Value: !Sub "${ClusterName}-efs"
        - Key: kubernetes.io/cluster
          Value: !Ref ClusterName
      FileSystemPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action:
              - elasticfilesystem:ClientMount
              - elasticfilesystem:ClientWrite
            Condition:
              Bool:
                elasticfilesystem:AccessedViaMountTarget: 'true'

  # ================================
  # EFS Security Group
  # ================================
  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "Security group for ${ClusterName} EFS"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Ref VpcCidr
          Description: "Allow NFS from VPC"
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-efs-sg"

  # ================================
  # EFS Mount Targets (4 AZs)
  # ================================
  EfsMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Select [0, !Ref PrivateSubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Select [1, !Ref PrivateSubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget3:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Select [2, !Ref PrivateSubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget4:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Select [3, !Ref PrivateSubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  # ================================
  # Lambda Function for kubectl commands
  # ================================
  KubectlLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: KubectlLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - eks:DescribeCluster
                Resource: !Sub "arn:${AWS::Partition}:eks:${AWS::Region}:${AWS::AccountId}:cluster/${ClusterName}"
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:${AWS::Partition}:s3:::${ArtifactBucket}/*"

  KubectlLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ClusterName}-kubectl-applier"
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt KubectlLambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      Code:
        ZipFile: |
          import json
          import boto3
          import base64
          import subprocess
          import os
          import urllib3

          eks_client = boto3.client('eks')
          http = urllib3.PoolManager()

          def send_response(event, context, status, data=None):
              response_body = {
                  'Status': status,
                  'PhysicalResourceId': data.get('PhysicalResourceId', context.log_stream_name) if data else context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              }

              http.request(
                  'PUT',
                  event['ResponseURL'],
                  body=json.dumps(response_body),
                  headers={'Content-Type': 'application/json'}
              )

          def get_kubeconfig(cluster_name):
              cluster_info = eks_client.describe_cluster(name=cluster_name)['cluster']

              kubeconfig = {
                  'apiVersion': 'v1',
                  'kind': 'Config',
                  'clusters': [{
                      'name': cluster_name,
                      'cluster': {
                          'server': cluster_info['endpoint'],
                          'certificate-authority-data': cluster_info['certificateAuthority']['data']
                      }
                  }],
                  'contexts': [{
                      'name': cluster_name,
                      'context': {
                          'cluster': cluster_name,
                          'user': cluster_name
                      }
                  }],
                  'current-context': cluster_name,
                  'users': [{
                      'name': cluster_name,
                      'user': {
                          'exec': {
                              'apiVersion': 'client.authentication.k8s.io/v1beta1',
                              'command': 'aws',
                              'args': [
                                  'eks', 'get-token',
                                  '--cluster-name', cluster_name,
                                  '--region', os.environ['AWS_REGION']
                              ]
                          }
                      }
                  }]
              }

              return kubeconfig

          def lambda_handler(event, context):
              try:
                  request_type = event['RequestType']
                  props = event['ResourceProperties']

                  cluster_name = props['ClusterName']
                  manifest = props.get('Manifest', '')
                  resource_name = props.get('ResourceName', 'resource')

                  if request_type == 'Delete':
                      send_response(event, context, 'SUCCESS', {'PhysicalResourceId': resource_name})
                      return

                  # Write kubeconfig
                  kubeconfig = get_kubeconfig(cluster_name)
                  with open('/tmp/kubeconfig', 'w') as f:
                      json.dump(kubeconfig, f)

                  os.environ['KUBECONFIG'] = '/tmp/kubeconfig'

                  # Write manifest
                  with open('/tmp/manifest.yaml', 'w') as f:
                      f.write(manifest)

                  # Apply manifest
                  result = subprocess.run(
                      ['kubectl', 'apply', '-f', '/tmp/manifest.yaml'],
                      capture_output=True,
                      text=True,
                      timeout=60
                  )

                  if result.returncode != 0:
                      raise Exception(f"kubectl apply failed: {result.stderr}")

                  send_response(event, context, 'SUCCESS', {
                      'PhysicalResourceId': resource_name,
                      'Output': result.stdout
                  })

              except Exception as e:
                  print(f"Error: {str(e)}")
                  send_response(event, context, 'FAILED', {'Reason': str(e)})

  # ================================
  # EFS StorageClass
  # ================================
  EfsStorageClass:
    Type: Custom::KubectlApply
    DependsOn:
      - EfsMountTarget1
      - EfsMountTarget2
      - EfsMountTarget3
      - EfsMountTarget4
    Properties:
      ServiceToken: !GetAtt KubectlLambdaFunction.Arn
      ClusterName: !Ref ClusterName
      ResourceName: storageclass-efs-sc
      Manifest: !Sub |
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: efs-sc
        provisioner: efs.csi.aws.com
        mountOptions:
          - tls
        parameters:
          provisioningMode: efs-ap
          fileSystemId: ${EfsFileSystem}
          directoryPerms: "700"
          basePath: /openclaw
          uid: "1000"
          gid: "1000"

  # ================================
  # EBS gp3 StorageClass
  # ================================
  EbsGp3StorageClass:
    Type: Custom::KubectlApply
    Properties:
      ServiceToken: !GetAtt KubectlLambdaFunction.Arn
      ClusterName: !Ref ClusterName
      ResourceName: storageclass-gp3
      Manifest: |
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: gp3
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
        provisioner: ebs.csi.aws.com
        volumeBindingMode: WaitForFirstConsumer
        parameters:
          type: gp3
          encrypted: "true"
          iops: "3000"
          throughput: "125"
        allowVolumeExpansion: true

Outputs:
  EfsFileSystemId:
    Description: "EFS File System ID"
    Value: !Ref EfsFileSystem
    Export:
      Name: !Sub "${AWS::StackName}-EfsFileSystemId"

  EfsFileSystemArn:
    Description: "EFS File System ARN"
    Value: !GetAtt EfsFileSystem.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EfsFileSystemArn"

  EfsSecurityGroupId:
    Description: "EFS Security Group ID"
    Value: !Ref EfsSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-EfsSecurityGroupId"

  EfsMountTarget1Id:
    Description: "EFS Mount Target 1 ID"
    Value: !Ref EfsMountTarget1

  EfsMountTarget2Id:
    Description: "EFS Mount Target 2 ID"
    Value: !Ref EfsMountTarget2

  EfsMountTarget3Id:
    Description: "EFS Mount Target 3 ID"
    Value: !Ref EfsMountTarget3

  EfsMountTarget4Id:
    Description: "EFS Mount Target 4 ID"
    Value: !Ref EfsMountTarget4
