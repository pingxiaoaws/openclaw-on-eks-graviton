AWSTemplateFormatVersion: '2010-09-09'
Description: 'OpenClaw - Applications (Operator + Provisioning Service)'

Parameters:
  ClusterName:
    Type: String
    Description: "EKS cluster name"

  OperatorVersion:
    Type: String
    Default: "0.10.7"
    Description: "OpenClaw Operator Helm chart version"

  ProvisioningServiceImage:
    Type: String
    Description: "ECR URI for provisioning service image"

  ProvisioningServiceRoleArn:
    Type: String
    Description: "IAM role ARN for Provisioning Service (Pod Identity)"

  SharedBedrockRoleArn:
    Type: String
    Description: "Shared Bedrock IAM Role ARN"

  ArtifactBucket:
    Type: String
    Description: "S3 bucket for Lambda functions"

Resources:
  # ================================
  # Helm Lambda Function
  # ================================
  HelmLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: HelmLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - eks:DescribeCluster
                Resource: !Sub "arn:${AWS::Partition}:eks:${AWS::Region}:${AWS::AccountId}:cluster/${ClusterName}"
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:${AWS::Partition}:s3:::${ArtifactBucket}/*"

  HelmLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ClusterName}-helm-apps"
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt HelmLambdaExecutionRole.Arn
      Timeout: 600
      MemorySize: 512
      Code:
        ZipFile: |
          import json
          import boto3
          import subprocess
          import os
          import urllib3

          eks_client = boto3.client('eks')
          http = urllib3.PoolManager()

          def send_response(event, context, status, data=None, reason=None):
              response_body = {
                  'Status': status,
                  'PhysicalResourceId': data.get('PhysicalResourceId', context.log_stream_name) if data else context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {},
                  'Reason': reason or f"See CloudWatch Log Stream: {context.log_stream_name}"
              }
              http.request('PUT', event['ResponseURL'], body=json.dumps(response_body), headers={'Content-Type': 'application/json'})

          def get_kubeconfig(cluster_name):
              cluster_info = eks_client.describe_cluster(name=cluster_name)['cluster']
              kubeconfig = {
                  'apiVersion': 'v1',
                  'kind': 'Config',
                  'clusters': [{
                      'name': cluster_name,
                      'cluster': {
                          'server': cluster_info['endpoint'],
                          'certificate-authority-data': cluster_info['certificateAuthority']['data']
                      }
                  }],
                  'contexts': [{
                      'name': cluster_name,
                      'context': {'cluster': cluster_name, 'user': cluster_name}
                  }],
                  'current-context': cluster_name,
                  'users': [{
                      'name': cluster_name,
                      'user': {
                          'exec': {
                              'apiVersion': 'client.authentication.k8s.io/v1beta1',
                              'command': 'aws',
                              'args': ['eks', 'get-token', '--cluster-name', cluster_name, '--region', os.environ['AWS_REGION']]
                          }
                      }
                  }]
              }
              return kubeconfig

          def lambda_handler(event, context):
              try:
                  request_type = event['RequestType']
                  props = event['ResourceProperties']
                  cluster_name = props['ClusterName']
                  chart_name = props.get('ChartName')
                  release_name = props.get('ReleaseName')
                  namespace = props.get('Namespace', 'default')
                  values_yaml = props.get('ValuesYaml', '')
                  repo_name = props.get('RepoName')
                  repo_url = props.get('RepoUrl')

                  if request_type == 'Delete':
                      send_response(event, context, 'SUCCESS', {'PhysicalResourceId': release_name})
                      return

                  kubeconfig = get_kubeconfig(cluster_name)
                  with open('/tmp/kubeconfig', 'w') as f:
                      json.dump(kubeconfig, f)
                  os.environ['KUBECONFIG'] = '/tmp/kubeconfig'

                  if repo_name and repo_url:
                      subprocess.run(['helm', 'repo', 'add', repo_name, repo_url], check=True, timeout=60)
                      subprocess.run(['helm', 'repo', 'update'], check=True, timeout=60)

                  if values_yaml:
                      with open('/tmp/values.yaml', 'w') as f:
                          f.write(values_yaml)

                  cmd = ['helm', 'upgrade', '--install', release_name, chart_name, '--namespace', namespace, '--create-namespace', '--wait', '--timeout=10m']
                  if values_yaml:
                      cmd.extend(['-f', '/tmp/values.yaml'])

                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=600)

                  if result.returncode != 0:
                      raise Exception(f"Helm command failed: {result.stderr}")

                  send_response(event, context, 'SUCCESS', {
                      'PhysicalResourceId': release_name,
                      'Output': result.stdout
                  })

              except Exception as e:
                  print(f"Error: {str(e)}")
                  import traceback
                  traceback.print_exc()
                  send_response(event, context, 'FAILED', reason=str(e))

  KubectlLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ClusterName}-kubectl-apps"
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt HelmLambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      Code:
        ZipFile: |
          import json
          import boto3
          import subprocess
          import os
          import urllib3

          eks_client = boto3.client('eks')
          http = urllib3.PoolManager()

          def send_response(event, context, status, data=None, reason=None):
              response_body = {
                  'Status': status,
                  'PhysicalResourceId': data.get('PhysicalResourceId', context.log_stream_name) if data else context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {},
                  'Reason': reason or f"See CloudWatch Log Stream: {context.log_stream_name}"
              }
              http.request('PUT', event['ResponseURL'], body=json.dumps(response_body), headers={'Content-Type': 'application/json'})

          def get_kubeconfig(cluster_name):
              cluster_info = eks_client.describe_cluster(name=cluster_name)['cluster']
              kubeconfig = {
                  'apiVersion': 'v1',
                  'kind': 'Config',
                  'clusters': [{
                      'name': cluster_name,
                      'cluster': {
                          'server': cluster_info['endpoint'],
                          'certificate-authority-data': cluster_info['certificateAuthority']['data']
                      }
                  }],
                  'contexts': [{
                      'name': cluster_name,
                      'context': {'cluster': cluster_name, 'user': cluster_name}
                  }],
                  'current-context': cluster_name,
                  'users': [{
                      'name': cluster_name,
                      'user': {
                          'exec': {
                              'apiVersion': 'client.authentication.k8s.io/v1beta1',
                              'command': 'aws',
                              'args': ['eks', 'get-token', '--cluster-name', cluster_name, '--region', os.environ['AWS_REGION']]
                          }
                      }
                  }]
              }
              return kubeconfig

          def lambda_handler(event, context):
              try:
                  request_type = event['RequestType']
                  props = event['ResourceProperties']
                  cluster_name = props['ClusterName']
                  manifest = props.get('Manifest', '')

                  if request_type == 'Delete':
                      send_response(event, context, 'SUCCESS', {'PhysicalResourceId': props.get('ResourceName', 'resource')})
                      return

                  kubeconfig = get_kubeconfig(cluster_name)
                  with open('/tmp/kubeconfig', 'w') as f:
                      json.dump(kubeconfig, f)
                  os.environ['KUBECONFIG'] = '/tmp/kubeconfig'

                  with open('/tmp/manifest.yaml', 'w') as f:
                      f.write(manifest)

                  result = subprocess.run(['kubectl', 'apply', '-f', '/tmp/manifest.yaml'], capture_output=True, text=True, timeout=60)

                  if result.returncode != 0:
                      raise Exception(f"kubectl apply failed: {result.stderr}")

                  send_response(event, context, 'SUCCESS', {
                      'PhysicalResourceId': props.get('ResourceName', 'resource'),
                      'Output': result.stdout
                  })

              except Exception as e:
                  print(f"Error: {str(e)}")
                  send_response(event, context, 'FAILED', reason=str(e))

  # ================================
  # OpenClaw Operator (Helm)
  # ================================
  OpenClawOperatorHelmRelease:
    Type: Custom::HelmRelease
    Properties:
      ServiceToken: !GetAtt HelmLambdaFunction.Arn
      ClusterName: !Ref ClusterName
      RepoName: openclaw
      RepoUrl: https://openclaw.github.io/charts
      ChartName: !Sub "openclaw/openclaw-operator"
      ReleaseName: openclaw-operator
      Namespace: openclaw-operator-system
      ValuesYaml: !Sub |
        image:
          tag: ${OperatorVersion}
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        nodeSelector:
          kubernetes.io/arch: arm64

  # ================================
  # OpenClaw Namespace
  # ================================
  OpenClawNamespace:
    Type: Custom::KubectlApply
    Properties:
      ServiceToken: !GetAtt KubectlLambdaFunction.Arn
      ClusterName: !Ref ClusterName
      ResourceName: namespace-openclaw
      Manifest: |
        apiVersion: v1
        kind: Namespace
        metadata:
          name: openclaw
          labels:
            name: openclaw

  # ================================
  # Provisioning Service Namespace
  # ================================
  ProvisioningNamespace:
    Type: Custom::KubectlApply
    Properties:
      ServiceToken: !GetAtt KubectlLambdaFunction.Arn
      ClusterName: !Ref ClusterName
      ResourceName: namespace-openclaw-provisioning
      Manifest: |
        apiVersion: v1
        kind: Namespace
        metadata:
          name: openclaw-provisioning
          labels:
            name: openclaw-provisioning

  # ================================
  # Provisioning Service Deployment
  # ================================
  ProvisioningServiceDeployment:
    Type: Custom::KubectlApply
    DependsOn: ProvisioningNamespace
    Properties:
      ServiceToken: !GetAtt KubectlLambdaFunction.Arn
      ClusterName: !Ref ClusterName
      ResourceName: deployment-openclaw-provisioner
      Manifest: !Sub |
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: openclaw-provisioner
          namespace: openclaw-provisioning
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: openclaw-provisioner
          namespace: openclaw-provisioning
          labels:
            app: openclaw-provisioner
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: openclaw-provisioner
          template:
            metadata:
              labels:
                app: openclaw-provisioner
            spec:
              serviceAccountName: openclaw-provisioner
              nodeSelector:
                kubernetes.io/arch: arm64
              containers:
                - name: provisioner
                  image: ${ProvisioningServiceImage}
                  ports:
                    - containerPort: 8080
                      name: http
                  env:
                    - name: CLUSTER_NAME
                      value: ${ClusterName}
                    - name: AWS_REGION
                      value: ${AWS::Region}
                    - name: SHARED_BEDROCK_ROLE_ARN
                      value: ${SharedBedrockRoleArn}
                    - name: LOG_LEVEL
                      value: info
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: 8080
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  readinessProbe:
                    httpGet:
                      path: /ready
                      port: 8080
                    initialDelaySeconds: 10
                    periodSeconds: 5
                  resources:
                    requests:
                      cpu: 200m
                      memory: 256Mi
                    limits:
                      cpu: 500m
                      memory: 512Mi
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: openclaw-provisioner
          namespace: openclaw-provisioning
        spec:
          type: ClusterIP
          selector:
            app: openclaw-provisioner
          ports:
            - port: 8080
              targetPort: 8080
              protocol: TCP
              name: http

  # ================================
  # Provisioning Service Ingress (creates ALB)
  # ================================
  ProvisioningServiceIngress:
    Type: Custom::KubectlApply
    DependsOn: ProvisioningServiceDeployment
    Properties:
      ServiceToken: !GetAtt KubectlLambdaFunction.Arn
      ClusterName: !Ref ClusterName
      ResourceName: ingress-openclaw-provisioner
      Manifest: !Sub |
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: openclaw-provisioner-ingress
          namespace: openclaw-provisioning
          annotations:
            alb.ingress.kubernetes.io/scheme: internet-facing
            alb.ingress.kubernetes.io/target-type: ip
            alb.ingress.kubernetes.io/healthcheck-path: /health
            alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
            alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
            alb.ingress.kubernetes.io/healthy-threshold-count: "2"
            alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
            alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
            alb.ingress.kubernetes.io/ssl-redirect: "443"
            alb.ingress.kubernetes.io/tags: elbv2.k8s.aws/cluster=${ClusterName},Environment=production
        spec:
          ingressClassName: alb
          rules:
            - http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: openclaw-provisioner
                        port:
                          number: 8080

  # ================================
  # Pod Identity Association for Provisioning Service
  # ================================
  ProvisioningServicePodIdentity:
    Type: AWS::EKS::PodIdentityAssociation
    DependsOn: ProvisioningServiceDeployment
    Properties:
      ClusterName: !Ref ClusterName
      Namespace: openclaw-provisioning
      ServiceAccount: openclaw-provisioner
      RoleArn: !Ref ProvisioningServiceRoleArn

  # ================================
  # AWS Credentials Secret (for OpenClaw instances)
  # ================================
  AWSCredentialsSecret:
    Type: Custom::KubectlApply
    DependsOn: OpenClawNamespace
    Properties:
      ServiceToken: !GetAtt KubectlLambdaFunction.Arn
      ClusterName: !Ref ClusterName
      ResourceName: secret-aws-credentials
      Manifest: !Sub |
        apiVersion: v1
        kind: Secret
        metadata:
          name: aws-credentials
          namespace: openclaw
        type: Opaque
        stringData:
          AWS_DEFAULT_REGION: ${AWS::Region}
          AWS_ROLE_ARN: ${SharedBedrockRoleArn}

Outputs:
  OpenClawOperatorReleaseName:
    Description: "OpenClaw Operator Helm release name"
    Value: openclaw-operator

  ProvisioningServiceName:
    Description: "Provisioning Service deployment name"
    Value: openclaw-provisioner

  ProvisioningServiceNamespace:
    Description: "Provisioning Service namespace"
    Value: openclaw-provisioning

  ProvisioningServiceURL:
    Description: "Provisioning Service internal URL"
    Value: http://openclaw-provisioner.openclaw-provisioning.svc.cluster.local:8080

  OpenClawNamespace:
    Description: "OpenClaw instances namespace"
    Value: openclaw
