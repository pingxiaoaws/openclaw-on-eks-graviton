AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Code-server IDE for OpenClaw EKS management.
  Deploys a browser-based VS Code IDE (code-server) on EC2 behind CloudFront.
  Designed as a nested stack - receives VPC/Subnet from parent.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID from EKS stack

  PublicSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet ID to place IDE instance

  ClusterName:
    Type: String
    Description: EKS cluster name (for kubeconfig setup)

  InstanceVolumeSize:
    Type: Number
    Default: 30
    Description: EBS volume size in GB

  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type for IDE

  AmiParameterStoreName:
    Type: "AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>"
    Default: "/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64"

  CodeServerVersion:
    Type: String
    Default: "4.91.1"
    Description: code-server version

Mappings:
  PrefixListID:
    ap-northeast-1:
      PrefixList: pl-58a04531
    ap-northeast-2:
      PrefixList: pl-22a6434b
    ap-south-1:
      PrefixList: pl-9aa247f3
    ap-southeast-1:
      PrefixList: pl-31a34658
    ap-southeast-2:
      PrefixList: pl-b8a742d1
    ca-central-1:
      PrefixList: pl-38a64351
    eu-central-1:
      PrefixList: pl-a3a144ca
    eu-north-1:
      PrefixList: pl-fab65393
    eu-west-1:
      PrefixList: pl-4fa04526
    eu-west-2:
      PrefixList: pl-93a247fa
    eu-west-3:
      PrefixList: pl-75b1541c
    sa-east-1:
      PrefixList: pl-5da64334
    us-east-1:
      PrefixList: pl-3b927c52
    us-east-2:
      PrefixList: pl-b6a144df
    us-west-1:
      PrefixList: pl-4ea04527
    us-west-2:
      PrefixList: pl-82a045eb

Resources:

  # ===========================================================================
  # Security Group (uses EKS VPC, allows CloudFront HTTP)
  # ===========================================================================

  IdeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for OpenClaw IDE
      SecurityGroupIngress:
        - Description: Allow HTTP from CloudFront
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourcePrefixListId: !FindInMap [PrefixListID, !Ref "AWS::Region", PrefixList]
      SecurityGroupEgress:
        - Description: Allow all outbound traffic
          IpProtocol: -1
          CidrIp: 0.0.0.0/0
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-ide-sg'

  # ===========================================================================
  # IAM Role for IDE Instance
  # ===========================================================================

  IdeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ClusterName}-ide-role'
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - ssm.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore'
      Policies:
        - PolicyName: ide-secrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Ref IdePassword

  IdeEksPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${ClusterName}-ide-eks'
      Roles:
        - !Ref IdeRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: EKSFullAccess
            Effect: Allow
            Action:
              - eks:*
            Resource: "*"
          - Sid: IAMForServiceAccounts
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:ListRoles
              - iam:TagRole
              - iam:PassRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:ListAttachedRolePolicies
              - iam:ListRolePolicies
              - iam:ListInstanceProfilesForRole
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:ListPolicyVersions
              - iam:TagPolicy
              - iam:CreateOpenIDConnectProvider
              - iam:DeleteOpenIDConnectProvider
              - iam:GetOpenIDConnectProvider
              - iam:ListOpenIDConnectProviders
              - iam:TagOpenIDConnectProvider
              - iam:CreateInstanceProfile
              - iam:DeleteInstanceProfile
              - iam:GetInstanceProfile
              - iam:AddRoleToInstanceProfile
              - iam:RemoveRoleFromInstanceProfile
              - iam:TagInstanceProfile
              - iam:CreateServiceLinkedRole
            Resource: "*"
          - Sid: EC2Describe
            Effect: Allow
            Action:
              - ec2:Describe*
              - ec2:Get*
              - ec2:List*
              - ec2:CreateTags
              - ec2:DeleteTags
              - ec2:RunInstances
              - ec2:TerminateInstances
              - ec2:CreateSecurityGroup
              - ec2:DeleteSecurityGroup
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupIngress
              - ec2:CreateLaunchTemplate
              - ec2:DeleteLaunchTemplate
            Resource: "*"
          - Sid: ECR
            Effect: Allow
            Action:
              - ecr:GetAuthorizationToken
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:CreateRepository
              - ecr:DeleteRepository
              - ecr:DescribeRepositories
              - ecr:ListTagsForResource
              - ecr:TagResource
              - ecr:PutImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
              - ecr-public:GetAuthorizationToken
            Resource: "*"
          - Sid: EFSManagement
            Effect: Allow
            Action:
              - elasticfilesystem:Describe*
              - elasticfilesystem:Create*
              - elasticfilesystem:Delete*
              - elasticfilesystem:TagResource
            Resource: "*"
          - Sid: CloudFormation
            Effect: Allow
            Action:
              - cloudformation:*
            Resource: "*"
          - Sid: STS
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
              - sts:AssumeRole
              - sts:GetServiceBearerToken
            Resource: "*"
          - Sid: SSMParameters
            Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
              - ssm:DescribeParameters
            Resource: "*"
          - Sid: ELB
            Effect: Allow
            Action:
              - elasticloadbalancing:Describe*
              - elasticloadbalancing:Get*
            Resource: "*"
          - Sid: AutoScaling
            Effect: Allow
            Action:
              - autoscaling:Describe*
            Resource: "*"
          - Sid: CloudWatchLogs
            Effect: Allow
            Action:
              - logs:Describe*
              - logs:Get*
              - logs:List*
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:PutRetentionPolicy
            Resource: "*"
          - Sid: SecretsManager
            Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:DeleteSecret
              - secretsmanager:DescribeSecret
              - secretsmanager:GetSecretValue
              - secretsmanager:ListSecrets
              - secretsmanager:TagResource
              - secretsmanager:PutSecretValue
            Resource: "*"
          - Sid: SQS
            Effect: Allow
            Action:
              - sqs:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:sqs:${AWS::Region}:${AWS::AccountId}:${ClusterName}*'
          - Sid: Bedrock
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
              - bedrock:ListFoundationModels
              - bedrock:GetFoundationModel
            Resource: "*"
          - Sid: Cognito
            Effect: Allow
            Action:
              - cognito-idp:*
            Resource: "*"
          - Sid: S3ForHelm
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource: "*"
          - Sid: KMS
            Effect: Allow
            Action:
              - kms:Describe*
              - kms:List*
              - kms:Get*
            Resource: "*"
          - Sid: Pricing
            Effect: Allow
            Action:
              - pricing:GetProducts
            Resource: "*"

  IdeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref IdeRole

  # ===========================================================================
  # Secrets Manager (IDE password)
  # ===========================================================================

  IdePassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ClusterName}-ide-password'
      GenerateSecretString:
        ExcludeCharacters: "\"@/\\"
        ExcludePunctuation: true
        GenerateStringKey: password
        IncludeSpace: false
        PasswordLength: 32
        SecretStringTemplate: '{"password":""}'
    UpdateReplacePolicy: Delete
    DeletionPolicy: Delete

  # ===========================================================================
  # SSM Document (bootstrap script)
  # ===========================================================================

  IdeSSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      DocumentFormat: YAML
      Content:
        schemaVersion: "2.2"
        description: Bootstrap IDE instance with tools and code-server
        mainSteps:
          - action: aws:runShellScript
            name: BootstrapIDE
            inputs:
              runCommand:
                - !Sub |
                  set -e

                  # Install system packages
                  yum install -y git tar gzip vim nodejs npm make gcc g++ argon2 jq unzip

                  # Install AWS CLI v2
                  if ! command -v aws &>/dev/null || [[ $(aws --version 2>&1) != *"aws-cli/2"* ]]; then
                    curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
                    unzip -qo /tmp/awscliv2.zip -d /tmp
                    /tmp/aws/install --update
                    rm -rf /tmp/aws /tmp/awscliv2.zip
                  fi

                  # Install kubectl
                  curl -fsSL "https://dl.k8s.io/release/v1.34.0/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl
                  chmod +x /usr/local/bin/kubectl

                  # Install helm
                  curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

                  # Install eksctl
                  ARCH=amd64
                  PLATFORM=$(uname -s)_$ARCH
                  curl -fsSL "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$PLATFORM.tar.gz" | tar xz -C /usr/local/bin

                  # Install Caddy (reverse proxy for code-server)
                  dnf copr enable -y @caddy/caddy epel-9-x86_64 || true
                  dnf install -y caddy || yum install -y caddy
                  systemctl enable --now caddy

                  # Configure Caddy
                  tee /etc/caddy/Caddyfile <<EOF
                  http://${IdeCloudFrontDistribution.DomainName} {
                    reverse_proxy 127.0.0.1:8889
                  }
                  EOF
                  systemctl restart caddy

                  # Custom prompt
                  tee /etc/profile.d/openclaw_env.sh <<'EOF'
                  export PROMPT_COMMAND='export PS1="\u@openclaw-ide:\w$ "'
                  export AWS_REGION=${AWS::Region}
                  export EKS_CLUSTER_NAME=${ClusterName}
                  EOF

                  # Setup for ec2-user
                  cat <<"EOT" | sudo -E -H -u ec2-user bash
                  set -e

                  mkdir -p ~/environment

                  # Install code-server
                  codeServer=$(rpm -qa code-server | wc -l)
                  if [ "$codeServer" -eq "0" ]; then
                    curl -Ls -o /tmp/coder.rpm https://github.com/coder/code-server/releases/download/v${CodeServerVersion}/code-server-${CodeServerVersion}-amd64.rpm
                    sudo rpm -U "/tmp/coder.rpm"
                    sudo systemctl enable --now code-server@ec2-user
                  fi

                  # Configure code-server with password from Secrets Manager
                  PASSWORD_SECRET_VALUE=$(aws secretsmanager get-secret-value \
                    --secret-id "${IdePassword}" \
                    --query 'SecretString' --output text \
                    --region ${AWS::Region})
                  IDE_PASSWORD=$(echo "$PASSWORD_SECRET_VALUE" | jq -r '.password')
                  HASHED_PASSWORD=$(echo -n "$IDE_PASSWORD" | argon2 saltItWithSalt -l 32 -e)

                  mkdir -p ~/.config/code-server
                  tee ~/.config/code-server/config.yaml <<EOF
                  cert: false
                  auth: password
                  hashed-password: "$HASHED_PASSWORD"
                  bind-addr: 127.0.0.1:8889
                  EOF

                  # Configure kubeconfig
                  aws eks update-kubeconfig \
                    --name ${ClusterName} \
                    --region ${AWS::Region}

                  # Verify tools
                  echo "=== Tool versions ==="
                  kubectl version --client --short 2>/dev/null || kubectl version --client
                  helm version --short
                  eksctl version
                  aws --version
                  echo "=== Cluster access ==="
                  kubectl get nodes || echo "Cluster not yet accessible (may need aws-auth update)"

                  EOT

                  # Restart code-server
                  systemctl restart code-server@ec2-user

  # ===========================================================================
  # Lambda (trigger SSM bootstrap)
  # ===========================================================================

  BootstrapLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: !Sub '${ClusterName}-ide-bootstrap-lambda'
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:*:*:*'
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: "*"

  BootstrapLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ClusterName}-ide-bootstrap'
      Handler: index.lambda_handler
      Role: !GetAtt BootstrapLambdaRole.Arn
      Runtime: python3.12
      MemorySize: 256
      Timeout: 900
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import traceback

          def lambda_handler(event, context):
              responseData = {}
              status = cfnresponse.SUCCESS

              if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, status, {'Success': 'Deleted'}, 'CustomResourcePhysicalID')
                  return

              try:
                  ssm = boto3.client('ssm')
                  instance_id = event['ResourceProperties']['InstanceId']
                  ssm_document = event['ResourceProperties']['SsmDocument']

                  response = ssm.send_command(
                      InstanceIds=[instance_id],
                      DocumentName=ssm_document
                  )
                  command_id = response['Command']['CommandId']

                  waiter = ssm.get_waiter('command_executed')
                  waiter.wait(
                      CommandId=command_id,
                      InstanceId=instance_id,
                      WaiterConfig={'Delay': 10, 'MaxAttempts': 90}
                  )

                  responseData = {'Success': f'Bootstrapped instance: {instance_id}'}
              except Exception as e:
                  status = cfnresponse.FAILED
                  responseData = {'Error': traceback.format_exc()}
              finally:
                  cfnresponse.send(event, context, status, responseData, 'CustomResourcePhysicalID')

  BootstrapCustomResource:
    Type: Custom::BootstrapIDE
    DependsOn:
      - BootstrapLambdaRole
    Properties:
      ServiceToken: !GetAtt BootstrapLambdaFunction.Arn
      InstanceId: !Ref IdeInstance
      SsmDocument: !Ref IdeSSMDocument

  # ===========================================================================
  # EC2 Instance
  # ===========================================================================

  IdeInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiParameterStoreName
      InstanceType: !Ref InstanceType
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref InstanceVolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
      SubnetId: !Ref PublicSubnetId
      SecurityGroupIds:
        - !Ref IdeSecurityGroup
      IamInstanceProfile: !Ref IdeInstanceProfile
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-ide'
        - Key: Project
          Value: openclaw

  # ===========================================================================
  # CloudFront Distribution
  # ===========================================================================

  IdeCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        DefaultTTL: 86400
        MaxTTL: 31536000
        MinTTL: 1
        Name: !Sub '${ClusterName}-ide-cache'
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: all
          EnableAcceptEncodingGzip: false
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Accept-Charset
              - Authorization
              - Origin
              - Accept
              - Referer
              - Host
              - Accept-Language
              - Accept-Encoding
              - Accept-Datetime
          QueryStringsConfig:
            QueryStringBehavior: all

  IdeCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        Comment: !Sub 'OpenClaw IDE - ${ClusterName}'
        CacheBehaviors:
          - AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            Compress: false
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
            TargetOriginId: !Sub 'IDE-${ClusterName}'
            ViewerProtocolPolicy: allow-all
            PathPattern: "/proxy/*"
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
          CachePolicyId: !Ref IdeCachePolicy
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
          TargetOriginId: !Sub 'IDE-${ClusterName}'
          ViewerProtocolPolicy: allow-all
        Origins:
          - DomainName: !GetAtt IdeInstance.PublicDnsName
            Id: !Sub 'IDE-${ClusterName}'
            CustomOriginConfig:
              OriginProtocolPolicy: http-only

Outputs:
  IdeUrl:
    Description: IDE URL (code-server via CloudFront)
    Value: !Sub 'https://${IdeCloudFrontDistribution.DomainName}'

  IdePasswordSecretArn:
    Description: Secrets Manager ARN for IDE password
    Value: !Ref IdePassword

  IdePasswordConsoleUrl:
    Description: AWS Console link to IDE password secret
    Value: !Sub 'https://console.aws.amazon.com/secretsmanager/secret?name=${ClusterName}-ide-password&region=${AWS::Region}'

  IdeInstanceId:
    Description: IDE EC2 instance ID
    Value: !Ref IdeInstance

  IdeRoleArn:
    Description: IDE instance IAM role ARN (add to EKS aws-auth ConfigMap)
    Value: !GetAtt IdeRole.Arn
