---
# gp3 StorageClass for EBS volumes
# Higher performance and lower cost than gp2
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  # gp3 defaults: 3000 IOPS, 125 MB/s throughput
  # Can be customized with iops and throughput parameters
  # iops: "3000"
  # throughput: "125"
  encrypted: "true"
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Delete
