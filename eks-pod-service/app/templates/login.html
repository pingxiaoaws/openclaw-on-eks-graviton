<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw - Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🦞 OpenClaw</h1>
            <p>Multi-Tenant Provisioning Platform</p>
        </div>

        <div class="login-card">
            <h2>Sign In</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                    Sign In
                </button>

                <div id="login-error" class="error-message"></div>
            </form>
        </div>

        <div class="login-footer">
            <p>Powered by AWS Graviton • Secured by Amazon Cognito</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        // Check if already logged in
        if (Auth.init()) {
            window.location.href = '/dashboard';
        }

        // Handle login form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            const submitBtn = document.getElementById('login-btn');

            errorEl.textContent = '';
            errorEl.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                await Auth.signIn(email, password);
                // Redirect to dashboard on success
                window.location.href = '/dashboard';
            } catch (error) {
                errorEl.textContent = error.message || 'Login failed. Please check your credentials.';
                errorEl.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
