<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <!-- Amazon Cognito Identity SDK -->
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --plasma-orange: #ff6b35;
            --electric-blue: #004e89;
            --cyber-cyan: #00d4ff;
            --deep-space: #0a0e1a;
            --void-dark: #151925;
            --slate-medium: #1e2433;
            --text-primary: #ffffff;
            --text-muted: #8b93a7;
            --success: #00ff9d;
            --warning: #ffd93d;
            --danger: #ff5757;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 107, 53, 0.6);
            }
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--deep-space);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--electric-blue) 1px, transparent 1px),
                linear-gradient(90deg, var(--electric-blue) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05;
            z-index: 0;
        }

        .hidden {
            display: none !important;
        }

        /* Header */
        header {
            position: relative;
            background: linear-gradient(135deg, var(--void-dark), var(--slate-medium));
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.5s ease;
            z-index: 100;
        }

        .header-left h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--plasma-orange), var(--cyber-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--plasma-orange), #ff8c61);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .btn-secondary {
            background: rgba(0, 78, 137, 0.3);
            color: var(--electric-blue);
            border: 1px solid var(--electric-blue);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(0, 78, 137, 0.5);
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #00d77a, var(--success));
            color: var(--deep-space);
            font-weight: 700;
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 157, 0.4);
        }

        .btn-danger {
            background: rgba(255, 87, 87, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover:not(:disabled) {
            background: rgba(255, 87, 87, 0.25);
            transform: translateY(-2px);
        }

        .btn-lg {
            padding: 16px 32px;
            font-size: 1.1rem;
        }

        .btn-copy {
            padding: 8px 16px;
            font-size: 0.85rem;
            background: rgba(0, 212, 255, 0.15);
            color: var(--cyber-cyan);
            border: 1px solid rgba(0, 212, 255, 0.4);
        }

        .btn-copy:hover:not(:disabled) {
            background: rgba(0, 212, 255, 0.25);
        }

        /* Main Content */
        main {
            position: relative;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
            z-index: 1;
            animation: fadeIn 0.6s ease 0.2s both;
        }

        .actions-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 80px 20px;
            animation: fadeIn 0.4s ease;
        }

        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 24px;
            border: 4px solid rgba(255, 107, 53, 0.2);
            border-top: 4px solid var(--plasma-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading p {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        /* Messages */
        .error-banner,
        .success-banner {
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 0.95rem;
            animation: slideDown 0.4s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .error-banner {
            background: rgba(255, 87, 87, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .success-banner {
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 100px 40px;
            background: linear-gradient(135deg, var(--void-dark), var(--slate-medium));
            border: 2px dashed rgba(139, 147, 167, 0.3);
            border-radius: 24px;
            animation: fadeIn 0.6s ease;
        }

        .empty-icon {
            font-size: 6rem;
            margin-bottom: 24px;
            opacity: 0.4;
            animation: pulse 3s ease-in-out infinite;
        }

        .empty-state h2 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 36px;
        }

        /* Instance Display */
        .instance-card-large {
            background: linear-gradient(135deg, var(--void-dark), var(--slate-medium));
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        .instance-card-large::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--plasma-orange), transparent);
            animation: glowPulse 3s ease-in-out infinite;
        }

        .instance-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            padding-bottom: 32px;
            border-bottom: 1px solid rgba(139, 147, 167, 0.2);
        }

        .instance-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .status-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: inline-block;
        }

        .status-running {
            background: rgba(0, 255, 157, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
        }

        .status-pending {
            background: rgba(255, 217, 61, 0.15);
            color: var(--warning);
            border: 1px solid var(--warning);
            animation: pulse 2s ease-in-out infinite;
        }

        .status-failed {
            background: rgba(255, 87, 87, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        /* Instance Details */
        .instance-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .detail-group {
            background: rgba(10, 14, 26, 0.6);
            border: 1px solid rgba(139, 147, 167, 0.15);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .detail-group:hover {
            border-color: rgba(0, 212, 255, 0.4);
            transform: translateY(-2px);
        }

        .detail-group.full-width {
            grid-column: 1 / -1;
        }

        .detail-group label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .detail-value {
            color: var(--text-primary);
            font-size: 1.15rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
        }

        .gateway-endpoint {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .gateway-endpoint code {
            flex: 1;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 14px 18px;
            border-radius: 10px;
            color: var(--cyber-cyan);
            border: 1px solid rgba(0, 212, 255, 0.3);
            word-break: break-all;
        }

        /* Instance Actions */
        .instance-actions {
            display: flex;
            gap: 16px;
            padding-top: 32px;
            border-top: 1px solid rgba(139, 147, 167, 0.2);
        }

        .instance-actions .btn {
            flex: 1;
        }

        /* Runtime Selector */
        .runtime-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .runtime-selector > label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .runtime-options {
            display: flex;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid rgba(139, 147, 167, 0.3);
            border-radius: 10px;
            padding: 3px;
            gap: 2px;
        }

        .runtime-option {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .runtime-option:hover:not(.active) {
            color: var(--text-primary);
            background: rgba(139, 147, 167, 0.1);
        }

        .runtime-option.active[data-runtime="runc"] {
            background: rgba(0, 212, 255, 0.2);
            color: var(--cyber-cyan);
            border: 1px solid rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.15);
        }

        .runtime-option.active[data-runtime="kata-qemu"] {
            background: rgba(255, 107, 53, 0.2);
            color: var(--plasma-orange);
            border: 1px solid rgba(255, 107, 53, 0.4);
            box-shadow: 0 0 12px rgba(255, 107, 53, 0.15);
        }

        .runtime-icon {
            font-size: 1rem;
        }

        .runtime-label {
            font-size: 0.85rem;
        }

        /* Runtime Badge (in instance details) */
        .runtime-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .runtime-badge.runtime-runc {
            background: rgba(0, 212, 255, 0.15);
            color: var(--cyber-cyan);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .runtime-badge.runtime-kata {
            background: rgba(255, 107, 53, 0.15);
            color: var(--plasma-orange);
            border: 1px solid rgba(255, 107, 53, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 16px;
                padding: 20px;
            }

            main {
                padding: 24px;
            }

            .actions-bar {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .instance-details {
                grid-template-columns: 1fr;
            }

            .instance-actions {
                flex-direction: column;
            }

            .instance-card-large {
                padding: 28px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <h1>🦞 OpenClaw Dashboard</h1>
        </div>
        <div class="header-right">
            <span id="user-email" class="user-info"></span>
            <button id="logout-btn" class="btn btn-secondary">Logout</button>
        </div>
    </header>

    <main>
        <div class="actions-bar">
            <div class="runtime-selector" id="runtime-selector">
                <label>Runtime</label>
                <div class="runtime-options">
                    <button class="runtime-option active" data-runtime="runc">
                        <span class="runtime-icon">📦</span>
                        <span class="runtime-label">Standard</span>
                    </button>
                    <button class="runtime-option" data-runtime="kata-qemu">
                        <span class="runtime-icon">🛡️</span>
                        <span class="runtime-label">Secure VM</span>
                    </button>
                </div>
            </div>

            <button id="create-instance-btn" class="btn btn-primary">
                <span>➕</span> Create OpenClaw Instance
            </button>
            <button id="refresh-btn" class="btn btn-secondary">
                <span>🔄</span> Refresh
            </button>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading your instance...</p>
        </div>

        <div id="error-message" class="error-banner hidden"></div>

        <div id="instances-container">
            <!-- Empty State -->
            <div id="empty-state" class="empty-state hidden">
                <div class="empty-icon">📦</div>
                <h2>No OpenClaw Instance Yet</h2>
                <p>Get started by creating your first OpenClaw instance</p>
                <button class="btn btn-primary btn-lg" onclick="document.getElementById('create-instance-btn').click()">
                    <span>➕</span> Create Instance
                </button>
            </div>

            <!-- Instance Display -->
            <div id="instance-display" class="hidden">
                <div class="instance-card-large">
                    <div class="instance-header">
                        <div>
                            <h2>My OpenClaw Instance</h2>
                            <span id="instance-status" class="status-badge">Loading...</span>
                        </div>
                    </div>

                    <div class="instance-details">
                        <div class="detail-group">
                            <label>Instance ID</label>
                            <div class="detail-value" id="instance-id">-</div>
                        </div>

                        <div class="detail-group">
                            <label>Namespace</label>
                            <div class="detail-value" id="instance-namespace">-</div>
                        </div>

                        <div class="detail-group">
                            <label>Created At</label>
                            <div class="detail-value" id="instance-created">-</div>
                        </div>

                        <div class="detail-group">
                            <label>Runtime</label>
                            <div class="detail-value" id="instance-runtime">
                                <span class="runtime-badge runtime-runc">📦 Standard (runc)</span>
                            </div>
                        </div>

                        <div class="detail-group">
                            <label>Storage</label>
                            <div class="detail-value" id="instance-storage">
                                <span class="runtime-badge runtime-runc">📂 EFS (elastic)</span>
                            </div>
                        </div>

                        <div class="detail-group full-width">
                            <label>Gateway Endpoint</label>
                            <div class="gateway-endpoint">
                                <code id="instance-gateway">-</code>
                                <button class="btn btn-copy" id="copy-gateway-btn" title="Copy to clipboard">
                                    📋 Copy
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="instance-actions">
                        <button id="connect-btn" class="btn btn-success" disabled>
                            <span>🔗</span> Connect to Gateway
                        </button>
                        <button id="delete-btn" class="btn btn-danger">
                            <span>🗑️</span> Delete Instance
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Dynamically load scripts with correct path prefix
        (function() {
            const basePath = window.location.pathname.startsWith('/prod') ? '/prod' : '';
            const scripts = ['config.js', 'auth.js', 'api.js', 'dashboard.js'];

            function loadScript(index) {
                if (index >= scripts.length) {
                    // All scripts loaded, initialize dashboard
                    console.log('All scripts loaded, initializing dashboard...');
                    if (typeof Dashboard !== 'undefined') {
                        Dashboard.init();
                    } else {
                        console.error('Dashboard object not found after loading scripts');
                    }
                    return;
                }

                const script = document.createElement('script');
                script.src = basePath + '/static/js/' + scripts[index];
                script.onload = () => loadScript(index + 1);
                script.onerror = () => console.error('Failed to load:', scripts[index]);
                document.body.appendChild(script);
            }

            loadScript(0);
        })();
    </script>
</body>
</html>
