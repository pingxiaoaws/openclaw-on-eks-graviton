<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Provisioning Dashboard</title>
    <base href="{{ request.url_root }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen">
            <div class="login-container">
                <div class="logo">
                    <h1>🦞 OpenClaw</h1>
                    <p>Multi-Tenant Provisioning Platform</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">Sign In</button>
                    <div id="login-error" class="error-message"></div>
                </form>
            </div>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboard-screen" class="screen hidden">
            <header>
                <div class="header-left">
                    <h1>🦞 OpenClaw Dashboard</h1>
                </div>
                <div class="header-right">
                    <span id="user-email" class="user-info"></span>
                    <button id="logout-btn" class="btn btn-secondary">Logout</button>
                </div>
            </header>

            <main>
                <div class="actions-bar">
                    <button id="create-instance-btn" class="btn btn-primary">
                        <span>➕</span> Create New Instance
                    </button>
                    <button id="refresh-btn" class="btn btn-secondary">
                        <span>🔄</span> Refresh
                    </button>
                </div>

                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>Loading...</p>
                </div>

                <div id="instances-container">
                    <div id="no-instances" class="empty-state hidden">
                        <div class="empty-icon">📦</div>
                        <h2>No Instances Yet</h2>
                        <p>Click "Create New Instance" to get started</p>
                    </div>

                    <div id="instances-grid" class="instances-grid"></div>
                </div>

                <div id="error-message" class="error-banner hidden"></div>
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
