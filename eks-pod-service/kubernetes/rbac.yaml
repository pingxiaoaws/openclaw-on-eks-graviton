---
apiVersion: v1
kind: Namespace
metadata:
  name: openclaw-provisioning
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-provisioner
  namespace: openclaw-provisioning
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-provisioner
rules:
  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "delete"]

  # User namespace resources
  - apiGroups: [""]
    resources: ["resourcequotas", "services"]
    verbs: ["create", "get", "list"]

  # NetworkPolicy
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list"]

  # Ingress (for keeper ingress management)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "get", "list", "update", "patch"]

  # OpenClawInstance CRD
  - apiGroups: ["openclaw.rocks"]
    resources: ["openclawinstances"]
    verbs: ["create", "get", "list", "watch", "delete"]

  # Pod status queries (read-only) + exec (for device pairing)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Pod exec (for device pairing API)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]

  # Endpoints queries (for readiness checking)
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list"]

  # Secrets queries (for gateway token retrieval)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

  # StatefulSet queries (for status checking)
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-provisioner
subjects:
  - kind: ServiceAccount
    name: openclaw-provisioner
    namespace: openclaw-provisioning
