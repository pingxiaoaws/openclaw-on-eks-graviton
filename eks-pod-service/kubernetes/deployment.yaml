---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-provisioning
  namespace: openclaw-provisioning
  labels:
    app: openclaw-provisioning
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openclaw-provisioning
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: openclaw-provisioning
        version: v1
    spec:
      serviceAccountName: openclaw-provisioner
      nodeSelector:
        workload-type: provisioning
        arch: arm64
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: openclaw-provisioning
                topologyKey: kubernetes.io/hostname
      containers:
      - name: provisioning
        image: 970547376847.dkr.ecr.us-west-2.amazonaws.com/openclaw-provisioning:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-provisioning-secret
              key: secret-key
              optional: true
        # OpenClaw Instance 配置
        # - name: OPENCLAW_RUNTIME_CLASS
        #   value: "kata-fc"  # 留空使用 runc
        # - name: OPENCLAW_NODE_SELECTOR
        #   value: '{"workload-type":"kata"}'
        # - name: OPENCLAW_TOLERATIONS
        #   value: '[{"key":"kata-dedicated","operator":"Exists","effect":"NoSchedule"}]'
        - name: OPENCLAW_CPU_REQUEST
          value: "500m"
        - name: OPENCLAW_MEMORY_REQUEST
          value: "1Gi"
        - name: OPENCLAW_CPU_LIMIT
          value: "2"
        - name: OPENCLAW_MEMORY_LIMIT
          value: "4Gi"
        - name: OPENCLAW_STORAGE_SIZE
          value: "10Gi"
        - name: OPENCLAW_STORAGE_CLASS
          value: "gp3"
        - name: OPENCLAW_MODEL
          value: "bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0"
        - name: OPENCLAW_AWS_CREDENTIALS_SECRET
          value: "aws-credentials"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
