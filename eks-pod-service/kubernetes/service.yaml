---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-provisioning
  namespace: openclaw-provisioning
  labels:
    app: openclaw-provisioning
  annotations:
    # Uncomment if you need external access via NLB
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
spec:
  type: ClusterIP  # Change to LoadBalancer if you need external access
  selector:
    app: openclaw-provisioning
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  sessionAffinity: None
