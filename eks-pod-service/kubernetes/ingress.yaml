---
# ALB Ingress (Layer 7) - 支持 HTTP headers
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-provisioning-ingress
  namespace: openclaw-provisioning
  annotations:
    # ALB 配置
    alb.ingress.kubernetes.io/scheme: internal  # ⚠️ internal - 不暴露公网
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/load-balancer-name: openclaw-provisioning-internal

    # 健康检查
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'

    # 监听器配置
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

    # 跨 AZ 负载均衡
    alb.ingress.kubernetes.io/load-balancer-attributes: routing.http2.enabled=true

    # IP 白名单已移除 - ALB 是 internal scheme，只能从 VPC 内访问
    # VPC Link 需要访问 ALB，因此不限制 IP

    # 标签
    alb.ingress.kubernetes.io/tags: Environment=test,Application=openclaw-provisioning
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openclaw-provisioning
            port:
              number: 80
