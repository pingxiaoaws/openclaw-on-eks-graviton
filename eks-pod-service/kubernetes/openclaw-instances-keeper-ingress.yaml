---
# Keeper Ingress - Ensures the shared instances ALB is never deleted
# This ingress exists permanently to keep the ALB alive even when all user instances are deleted
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-instances-keeper
  namespace: openclaw-provisioning
  annotations:
    # Share the same ALB as OpenClaw instances
    alb.ingress.kubernetes.io/group.name: openclaw-shared-instances
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    # Health check to a valid endpoint
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/success-codes: "200"
  labels:
    app: openclaw-instances-keeper
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      # Placeholder path - not used for actual traffic
      # Just keeps the ALB alive
      - path: /_alb_healthcheck
        pathType: Exact
        backend:
          service:
            name: openclaw-provisioning
            port:
              number: 80
