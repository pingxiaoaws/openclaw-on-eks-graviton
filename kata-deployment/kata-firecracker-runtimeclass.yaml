---
# RuntimeClass for Kata Containers with Firecracker
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-fc
handler: kata-fc
scheduling:
  nodeSelector:
    katacontainers.io/kata-runtime: "true"
  tolerations:
    - key: kata-dedicated
      operator: Exists
      effect: NoSchedule
overhead:
  podFixed:
    memory: "200Mi"
    cpu: "100m"
